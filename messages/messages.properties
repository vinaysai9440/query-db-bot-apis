# Application message templates

# User messages
user.already.exists=Email '{email}' already exists
user.not.found=User with id '{user_id}' not found
user.delete.not.found=User with id '{user_id}' not found to delete
auth.invalid.credentials=Invalid email or password

# Table messages
table.already.exists=Table name '{table_name}' already exists
table.not.found=Table with id '{table_id}' not found
table.delete.not.found=Table with id '{table_id}' not found to delete

# Role messages
role.already.exists=Role name '{role_name}' already exists
role.not.found=Role with id '{role_id}' not found
role.delete.not.found=Role with id '{role_id}' not found to delete

# Chat/Session messages
session.not.found=Session with id '{session_id}' not found
chat.no.relevant.tables=No relevant tables found for your query. Please refine your question.
chat.invalid.sql.query=The generated SQL query is not allowed or invalid
